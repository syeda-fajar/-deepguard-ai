<!DOCTYPE html>
<html>
<head>
  <title>Upload Image</title>
</head>
<body>
  <h2>Upload an image to detect deepfake</h2>
  <form method="POST" enctype="multipart/form-data">
    <input type="file" name="image" accept="image/*" required>
    <button type="submit">Detect</button>
  </form>
</body>
</html>
